<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>
        <p class="subtitle">two player · play vs AI</p>

        <!-- TOP BUTTONS -->

        <div class="controls">

            <button id="manualBtn">👥 2 Players</button>

            <button id="aiBtn">🤖 vs AI</button>

            <button id="recordBtn">🏆 Records</button>

        </div>

        <!-- PLAYER INPUTS -->

        <div class="players">

            <input type="text" id="playerX" placeholder="Player 1">

            <input type="text" id="playerO" placeholder="Player 2">

        </div>

        <!-- SCORE BOARD -->

        <div class="scoreboard">

            <div class="score-card">
                <h3 id="xTitle">PLAYER 1 ( X )</h3>
                <p id="xScore">0</p>
            </div>

            <div class="score-card">
                <h3>DRAWS</h3>
                <p id="drawScore">0</p>
            </div>

            <div class="score-card">
                <h3 id="oTitle">PLAYER 2 ( O )</h3>
                <p id="oScore">0</p>
            </div>

        </div>

        <!-- STATUS -->

        <h2 id="status">Player 1's turn (X)</h2>

        <!-- BOARD -->

        <div class="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <!-- BOTTOM BUTTONS -->

        <div class="bottom-buttons">

            <button id="newGameBtn">🔄 New Game</button>

            <button id="saveBtn">💾 Save Result</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
